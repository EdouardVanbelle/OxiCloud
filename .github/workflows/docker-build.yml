name: Docker Build and Test

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

#concurrency:
#  group: rust-build-${{ github.ref }}
#  cancel-in-progress: false

jobs:
  build-and-test:
    name: Build and Test Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 45

    services:
      postgres:
        image: postgres:18.2-alpine3.23
        env:
          POSTGRES_USER: oxicloud_test
          POSTGRES_PASSWORD: oxicloud_test
          POSTGRES_DB: oxicloud_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 2s
          --health-timeout 5s
          --health-retries 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: test/oxicloud
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: test/oxicloud:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify /ready returns 200
        run: |
          # Start OxiCloud with host networking so it can reach the postgres service
          docker run -d --name oxicloud-test \
            --network host \
            -e OXICLOUD_DB_CONNECTION_STRING="postgres://oxicloud_test:oxicloud_test@localhost:5432/oxicloud_test" \
            -e OXICLOUD_STATIC_PATH=/app/static \
            -e OXICLOUD_JWT_SECRET="ci-test-secret-do-not-use-in-prod-minimum-32-chars" \
            -e OXICLOUD_ENABLE_AUTH=true \
            -e OXICLOUD_ENABLE_TRASH=true \
            -e OXICLOUD_ENABLE_SEARCH=true \
            -e OXICLOUD_SERVER_PORT=8086 \
            -e RUST_LOG=warn \
            test/oxicloud:test

          echo "Waiting for /ready..."
          timeout 60 bash -c \
            'until curl -sf http://localhost:8086/ready > /dev/null; do sleep 1; done'

          echo "=== /ready response ==="
          curl -sf http://localhost:8086/ready | tee /tmp/ready.json
          echo ""

          # Assert both server and DB report ok
          grep -q '"status":"ok"' /tmp/ready.json
          grep -q '"db":"ok"'     /tmp/ready.json

          echo "✅ /ready returned 200 with status=ok and db=ok"

          docker rm -f oxicloud-test

      - name: Verify image structure
        run: |
          echo "=== Image size ==="
          docker image ls test/oxicloud:test

          echo "=== Binary exists and is executable ==="
          docker run --rm --entrypoint sh test/oxicloud:test -c "test -x /usr/local/bin/oxicloud && echo 'OK: binary is executable'"

          echo "=== Static files present ==="
          docker run --rm --entrypoint sh test/oxicloud:test -c "ls /app/static/index.html && echo 'OK: static files present'"

          echo "✅ Docker build and test completed successfully"
